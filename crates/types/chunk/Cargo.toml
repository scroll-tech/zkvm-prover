[package]
name = "scroll-zkvm-types-chunk"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
readme.workspace = true
repository.workspace = true
version.workspace = true

[dependencies]
alloy-primitives = { workspace = true }
alloy-consensus = { workspace = true, features = ["crypto-backend"] }
alloy-sol-types.workspace = true
ecies.workspace = true
hashbrown = { workspace = true, default-features = false, features = ["default-hasher"] }
hex-literal.workspace = true
itertools.workspace = true
sbv-helpers.workspace = true
sbv-core = { workspace = true, features = [] }
sbv-trie = { workspace = true }
sbv-primitives = { workspace = true, features = [
  "hardforks",
  "evm-types",
  "revm-types",
  "reth-evm-types",
] }
serde.workspace = true
thiserror.workspace = true
openvm-ecc-guest = { workspace = true, optional = true }
openvm-k256 = { workspace = true, optional = true }
openvm-p256 = { workspace = true, optional = true }
openvm-sha2 = { workspace = true, optional = true }
openvm-pairing = { workspace = true, features = ["bn254"], optional = true }
types-base = { path = "../base", package = "scroll-zkvm-types-base" }

[dev-dependencies]
ark-bn254 = "0.5.0"
ark-ff = "0.5.0"
ark-serialize = "0.5.0"
ark-ec = "0.5.0"
openvm-pairing = { workspace = true, features = ["bn254", "halo2curves"] }
openvm-pairing-guest = { workspace = true, features = ["bn254", "halo2curves"] }


[features]
default = []
openvm = [
  "dep:openvm-ecc-guest",
  "dep:openvm-k256",
  "dep:openvm-p256",
  "dep:openvm-sha2",
  "dep:openvm-pairing",
  "alloy-primitives/native-keccak",
]
host = ["scroll", "scroll-compress-info", "alloy-primitives/tiny-keccak"]
scroll = [
  "sbv-core/scroll",
  "sbv-primitives/scroll-evm-types",
  "sbv-primitives/scroll-hardforks",
  "sbv-primitives/scroll-revm-types",
  "sbv-primitives/scroll-reth-evm-types",
]
scroll-compress-info = ["sbv-core/scroll", "sbv-core/scroll-compress-info"]
